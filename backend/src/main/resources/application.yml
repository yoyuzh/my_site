server:
  address: 127.0.0.1
  port: 8080

spring:
  application:
    name: yoyuzh-portal-backend
  datasource:
    url: jdbc:mysql://localhost:3306/yoyuzh_portal?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    access-expiration-seconds: 900
    refresh-expiration-seconds: 1209600
  admin:
    usernames: ${APP_ADMIN_USERNAMES:}
  registration:
    invite-code: ${APP_AUTH_REGISTRATION_INVITE_CODE:}
  storage:
    root-dir: ./storage
    max-file-size: 524288000
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  config: classpath:logback.xml
