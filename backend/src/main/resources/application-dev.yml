spring:
  datasource:
    url: jdbc:h2:file:./data/yoyuzh_portal_dev;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  admin:
    usernames: ${APP_ADMIN_USERNAMES:}
  cqu:
    mock-enabled: true
